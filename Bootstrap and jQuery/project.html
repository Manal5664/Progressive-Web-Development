<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS Cafe</title>
    <link href="bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-strip text-center fw-semibold px-2 text-light py-2">
        All Over Korangi - DC Only Rs. 100
    </div>

    <header class="site-header">
        <nav class="navbar header-nav">
            <div class="container-fluid px-3 py-3 d-flex align-items-center justify-content-between">
                <!--d-flex Parent container flex container ban jata hai
                Flex container isliye banate hain: Taake hum apne child elements ko easily align, space aur control kar saken — bina complex CSS ke.
                    Andar ke items flex items ban jate hain
                    Items horizontal line me arrange ho jate hain (by default) -->
                <button class="btn phone-btn btn-sm rounded-3 flex-shrink-0">
                    <!--(flex-shrink-0) Flexbox me use hota hai → button apni width ko shrink nahi karega, container chhota hone par bhi -->
                    <i class="bi bi-telephone-fill"></i>
                    <span class="d-none d-md-inline">03326772233</span>
                </button>

                <button class="btn cart-btn position-relative flex-shrink-0">
                    <i class="bi bi-cart3"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">0</span>
                </button>
            </div>

            <div class="header-logo">
                <img src="Images/Logo.webp" alt="BOSS Cafe" class="logo-img">
            </div>
        </nav>

        <section class="header-banner">
            <img src="Images/Header-Banner-1.webp" alt="BOSS Cafe Banner" class="header-banner-img">
        </section>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
